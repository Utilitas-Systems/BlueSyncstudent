# App lives in ./nexus-class-sync-main (zip layout). GitHub only loads workflows from repo root.
name: Build and Publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  APP_DIR: nexus-class-sync-main

defaults:
  run:
    working-directory: nexus-class-sync-main

jobs:
  prepare:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      releaseId: ${{ steps.create_release.outputs.id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 'BlueSync Student v${{ steps.version.outputs.version }} (build ${{ github.run_number }})'
          body: 'See the assets below to download. Choose Mac (Apple Silicon or Intel) or Windows.'
          draft: false
          prerelease: false

  build:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rustTarget: aarch64-apple-darwin
            tauriArgs: --target aarch64-apple-darwin
          - platform: macos-latest
            rustTarget: x86_64-apple-darwin
            tauriArgs: --target x86_64-apple-darwin
          - platform: windows-latest
            rustTarget: x86_64-pc-windows-msvc
            tauriArgs: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: nexus-class-sync-main/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Install dependencies
        run: npm ci

      # createUpdaterArtifacts requires TAURI_SIGNING_PRIVATE_KEY.
      # For production auto-update support we require a valid PRIVATE key and fail fast if missing/invalid,
      # instead of silently shipping installers without updater metadata/signatures.
      - name: Configure updater for CI
        id: configure_updater
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const raw = process.env.KEY ? String(process.env.KEY).trim() : '';
          // Public keys also contain "minisign" + "untrusted comment" — using them as TAURI_SIGNING_PRIVATE_KEY breaks the build.
          const looksLikeMinisignPrivateKey =
            raw.length >= 80 &&
            /minisign encrypted secret key/i.test(raw) &&
            !/minisign public key/i.test(raw);
          const hasKey = looksLikeMinisignPrivateKey;
          const p = 'src-tauri/tauri.conf.json';
          const j = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (!hasKey) {
            if (raw.length > 0) {
              console.log('::error::TAURI_SIGNING_PRIVATE_KEY must be the full PRIVATE key file from `tauri signer generate` (first line contains "minisign encrypted secret key"). Not the .pub file.');
            } else {
              console.log('::error::TAURI_SIGNING_PRIVATE_KEY is not set. Auto-update requires signed updater artifacts (latest.json + signatures).');
            }
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_signing_key=${hasKey}\n`);
          NODE

      # Multiline secrets in YAML ${{ }} often break on macOS runners; append to GITHUB_ENV instead.
      - name: Load signing secrets for Tauri (multiline-safe)
        if: steps.configure_updater.outputs.has_signing_key == 'true'
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          DELIM="TAURI_SIGNING_KEY___EOF___"
          echo "TAURI_SIGNING_PRIVATE_KEY<<$DELIM" >> "$GITHUB_ENV"
          printf '%s\n' "$SIGNING_KEY" >> "$GITHUB_ENV"
          echo "$DELIM" >> "$GITHUB_ENV"
          if [ -n "${SIGNING_PASSWORD+x}" ] && [ -n "$SIGNING_PASSWORD" ]; then
            DELIM2="TAURI_SIGNING_PW___EOF___"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<$DELIM2" >> "$GITHUB_ENV"
            printf '%s\n' "$SIGNING_PASSWORD" >> "$GITHUB_ENV"
            echo "$DELIM2" >> "$GITHUB_ENV"
          fi

      - name: Build and Publish Tauri
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Must be only `npm run tauri` — the action adds `build` itself. A package.json script
          # `"tauri": "tauri build"` + default detection would become `tauri build build` and fail.
          tauriScript: npm run tauri
          projectPath: nexus-class-sync-main
          args: ${{ matrix.tauriArgs }}
          releaseId: ${{ needs.prepare.outputs.releaseId }}
          releaseBody: 'See the assets below to download. Choose Mac (Apple Silicon or Intel) or Windows.'
          includeUpdaterJson: ${{ steps.configure_updater.outputs.has_signing_key == 'true' }}
          updaterJsonPreferNsis: ${{ steps.configure_updater.outputs.has_signing_key == 'true' }}
